    <header>

        <nav>

    <main class="main-body">

        <div class="form">
            <form>
                <h3>Name</h3>
                <input type="text" placeholder="Enter Name" required>

                <h3>Last Name</h3>
                <input type="text" placeholder="Enter Lastname" required>

                <h3>Date</h3>
                <input type="text" placeholder="Reservation Date" required>

                <h3>Time</h3>
                <input type="text" placeholder="Reserved Time" required>

                <h3>Reason</h3>
                <input type="text" placeholder="Reasons for reservation" required>

                <div class="button">
                    <button>Make reservation</button>
                </div>
            </form>
            <img src="images/reserved table.jpg">
        </div>
    </main>
